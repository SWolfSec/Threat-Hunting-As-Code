name: Bootstrap Artifact From Issue

on:
  issues:
    types: [opened, labeled]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  bootstrap:
    if: >
      contains(join(github.event.issue.labels.*.name, ','), 'intake') &&
      (
        contains(join(github.event.issue.labels.*.name, ','), 'hunt') ||
        contains(join(github.event.issue.labels.*.name, ','), 'campaign')
      ) &&
      contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.issue.author_association)
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate draft artifact from issue form
        id: bootstrap
        run: |
          python scripts/automation/bootstrap_from_issue.py \
            --event-path "$GITHUB_EVENT_PATH" \
            --repo-root "$GITHUB_WORKSPACE" \
            --output-file "$GITHUB_OUTPUT"

      - name: Create pull request with generated draft
        if: steps.bootstrap.outputs.created == 'true'
        id: create_pr
        uses: peter-evans/create-pull-request@v6
        with:
          branch: ${{ steps.bootstrap.outputs.branch }}
          title: "chore: bootstrap draft from issue #${{ github.event.issue.number }}"
          commit-message: "chore: bootstrap draft from issue #${{ github.event.issue.number }}"
          body: |
            Auto-generated draft artifact from issue #${{ github.event.issue.number }}.

            Generated file:
            - `${{ steps.bootstrap.outputs.file }}`

            The file follows project templates and is intended for analyst refinement.
          labels: |
            automation
            draft-generated

      - name: Comment with generated PR link
        if: steps.bootstrap.outputs.created == 'true' && steps.create_pr.outputs.pull-request-url != ''
        uses: actions/github-script@v7
        with:
          script: |
            const url = `${{ steps.create_pr.outputs.pull-request-url }}`;
            const file = `${{ steps.bootstrap.outputs.file }}`;
            const body = [
              `Draft artifact created and opened as a PR: ${url}`,
              ``,
              `Generated file: \`${file}\``,
              ``,
              `You can now continue directly in that PR.`
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });

      - name: Comment when file already exists
        if: steps.bootstrap.outputs.created != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const reason = `${{ steps.bootstrap.outputs.reason }}`;
            const file = `${{ steps.bootstrap.outputs.file }}`;
            let body = `No new draft file was generated (${reason}).`;
            if (file) body += `\n\nExisting file: \`${file}\``;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });
