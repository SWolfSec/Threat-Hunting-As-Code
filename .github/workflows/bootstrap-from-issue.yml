name: Bootstrap Artifact From Issue

on:
  issues:
    types: [opened, labeled]

permissions:
  contents: write
  issues: write

jobs:
  bootstrap:
    if: >
      contains(join(github.event.issue.labels.*.name, ','), 'intake') &&
      (
        contains(join(github.event.issue.labels.*.name, ','), 'hunt') ||
        contains(join(github.event.issue.labels.*.name, ','), 'campaign')
      ) &&
      contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.issue.author_association)
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate draft artifact from issue form
        id: bootstrap
        run: |
          python scripts/automation/bootstrap_from_issue.py \
            --event-path "$GITHUB_EVENT_PATH" \
            --repo-root "$GITHUB_WORKSPACE" \
            --output-file "$GITHUB_OUTPUT"

      - name: Create and push draft branch
        if: steps.bootstrap.outputs.created == 'true'
        id: push_branch
        run: |
          BASE_BRANCH="${{ steps.bootstrap.outputs.branch }}"
          BRANCH="${BASE_BRANCH}-${{ github.run_id }}-${{ github.run_attempt }}"
          FILE="${{ steps.bootstrap.outputs.file }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add "$FILE"
          git commit -m "chore: bootstrap draft from issue #${{ github.event.issue.number }}"
          git push -u origin "$BRANCH"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"

      - name: Comment with branch and next steps
        if: steps.bootstrap.outputs.created == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const file = `${{ steps.bootstrap.outputs.file }}`;
            const branch = `${{ steps.push_branch.outputs.branch }}`;
            const repoUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}`;
            const compareUrl = `${repoUrl}/compare/${branch}?expand=1`;
            const body = [
              `Draft artifact generated on branch \`${branch}\`.`,
              ``,
              `Generated file: \`${file}\``,
              ``,
              `Next steps for hunter:`,
              `1. Review/refine the draft on branch \`${branch}\``,
              `2. Open a PR when ready: ${compareUrl}`,
            ].join('\\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });

      - name: Comment when file already exists
        if: steps.bootstrap.outputs.created != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const reason = `${{ steps.bootstrap.outputs.reason }}`;
            const file = `${{ steps.bootstrap.outputs.file }}`;
            let body = `No new draft file was generated (${reason}).`;
            if (file) body += `\n\nExisting file: \`${file}\``;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });
