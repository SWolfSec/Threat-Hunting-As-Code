name: Hunt Metrics

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review, closed]
    branches: [main]

permissions:
  contents: read

jobs:
  validate-hunts:
    # Runs during PR lifecycle and fails fast on missing required fields.
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest

    steps:
      - name: Check out PR branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate hunt metrics and dashboard
        run: |
          python scripts/metrics/parse_hunts.py --strict

  build-metrics:
    # Only run when PR is actually merged into main.
    if: github.event.action == 'closed' && github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate hunt metrics and dashboard
        run: |
          python scripts/metrics/parse_hunts.py --strict

      - name: Commit dashboard + extracted artifacts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A docs/dashboard.md scripts/metrics/hunt_metrics_summary.json
          git add campaigns/ 2>/dev/null || true
          # Add extracted query/ioc artifacts if parser emits them now or in the future.
          git add -A hunts/extracted scripts/metrics/extracted 2>/dev/null || true

          if git diff --cached --quiet; then
            echo "No dashboard or metrics changes to commit."
            exit 0
          fi

          git commit -m "chore(metrics): refresh hunt dashboard and extracted artifacts"
          git push
